name: Seesaw Web Production Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check_branch:
    runs-on: ubuntu-latest
    outputs:
      on_prod_branch: ${{ steps.check_branch.outputs.on_prod_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on prod branch
        id: check_branch
        run: |
          BRANCH=$(git branch -r --contains ${{ github.ref }} | grep -v HEAD | sed -e 's/^[[:space:]]*//' -e 's/^origin\///')
          echo "Branch containing tag: $BRANCH"
          if echo "$BRANCH" | grep -q "prod"; then
            echo "Tag is on prod branch. Proceeding."
            echo "on_prod_branch=true" >> $GITHUB_OUTPUT
          else
            echo "Tag is not on prod branch. Skipping."
            echo "on_prod_branch=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check_branch
    if: needs.check_branch.outputs.on_prod_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          ./gradlew :seesaw-web:test
          echo "Unit tests completed"

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="1.0.0-SNAPSHOT"
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Release version: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with Gradle Wrapper
        run: ./gradlew :seesaw-web:clean :seesaw-web:bootJar -PappVersion=${{ env.VERSION }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seesaw-web-release-${{ steps.get_version.outputs.version }}
          path: seesaw-web/build/libs/*.jar
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: seesaw-web/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: seesaw-web-release-${{ needs.build.outputs.version }}
          path: ./artifacts

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to remote server
        id: deploy
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
          APP_NAME: seesaw-web-${{ needs.build.outputs.version }}.jar
        run: |
          echo "Starting deployment..."
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "mkdir -p $REMOTE_DIR"
          
          JAR_FILE=$(find ./artifacts -name "*.jar" -type f | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: JAR file not found."
            exit 1
          fi
          
          scp "$JAR_FILE" $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR/$APP_NAME
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Restart application
        if: steps.deploy.outputs.deployed == 'true'
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
          APP_NAME: seesaw-web-${{ needs.build.outputs.version }}.jar
        run: |
          ssh $REMOTE_USER@$REMOTE_HOST "cd $REMOTE_DIR && \
            ./shutdown.sh seesaw-web && \
            ./startup.sh $APP_NAME && \
            echo "Application restarted.""

      - name: Verify application
        if: steps.deploy.outputs.deployed == 'true'
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          APP_PORT: ${{ secrets.APP_PORT }}
          HEALTH_ENDPOINT: ${{ secrets.HEALTH_ENDPOINT || '/actuator/health' }}
        run: |
          sleep 10
          ssh $REMOTE_USER@$REMOTE_HOST "curl -f http://localhost:$APP_PORT$HEALTH_ENDPOINT"
