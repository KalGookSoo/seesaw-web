name: Production Release Build

# GitHub Actions 워크플로우 문서: https://docs.github.com/ko/actions/using-workflows
#
# 필요한 시크릿(Secrets) 설정:
# - SSH_PRIVATE_KEY: 원격 서버 접속을 위한 SSH 개인 키
# - REMOTE_HOST: 원격 서버 주소
# - REMOTE_USER: 원격 서버 접속 사용자 이름
# - REMOTE_DIR: 원격 서버에서 애플리케이션을 배포할 디렉토리 경로
#
# 선택적 시크릿(Secrets) 설정:
# - APP_PORT: 애플리케이션이 실행되는 포트
# - HEALTH_ENDPOINT: 애플리케이션 상태 확인 엔드포인트

on:
  push:
    tags:
      - 'v*'

jobs:
  check_branch:
    runs-on: ubuntu-latest
    # steps 컨텍스트 문서: https://docs.github.com/ko/actions/learn-github-actions/contexts#steps-context
    outputs:
      on_prod_branch: ${{ steps.check_branch.outputs.on_prod_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on prod branch
        id: check_branch
        run: |
          # GitHub 컨텍스트 변수 문서: https://docs.github.com/ko/actions/learn-github-actions/contexts#github-context
          # github.ref: 워크플로우를 트리거한 브랜치 또는 태그 참조

          # 태그가 포함된 브랜치 가져오기
          BRANCH=$(git branch -r --contains ${{ github.ref }} | grep -v HEAD | sed -e 's/^[[:space:]]*//' -e 's/^origin\///')
          echo "태그가 있는 브랜치: $BRANCH"

          # prod 브랜치에 태그가 포함되어 있는지 확인
          # GITHUB_OUTPUT 환경 변수 문서: https://docs.github.com/ko/actions/using-workflows/workflow-commands-for-github-actions#setting-an-output-parameter
          if echo "$BRANCH" | grep -q "prod"; then
            echo "태그가 있습니다. 빌드를 진행합니다."
            echo "on_prod_branch=true" >> $GITHUB_OUTPUT
          else
            echo "태그가 없습니다. 빌드를 건너뜁니다."
            echo "on_prod_branch=false" >> $GITHUB_OUTPUT
          fi

  build:
    # needs 컨텍스트 문서: https://docs.github.com/ko/actions/learn-github-actions/contexts#needs-context
    needs: check_branch
    if: needs.check_branch.outputs.on_prod_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: |
          echo "단위 테스트 실행 중..."
          ./gradlew test
          echo "단위 테스트 완료"

      - name: Extract version from tag
        id: get_version
        run: |
          # GitHub 환경 변수 문서: https://docs.github.com/ko/actions/learn-github-actions/environment-variables
          # GITHUB_REF: 워크플로우를 트리거한 브랜치 또는 태그의 전체 참조 (예: refs/heads/main 또는 refs/tags/v1.0.0)
          # GITHUB_ENV: GitHub Actions에서 환경 변수를 설정하는 파일
          # GITHUB_OUTPUT: GitHub Actions에서 출력 변수를 설정하는 파일

          # 태그가 아닌 경우 기본 버전
          VERSION="1.0.0-SNAPSHOT"

          # 태그 푸시인 경우 태그에서 버전 추출
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "배포 버전: $VERSION"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with Gradle Wrapper
        # env 컨텍스트 문서: https://docs.github.com/ko/actions/learn-github-actions/contexts#env-context
        run: ./gradlew clean bootJar -PappVersion=${{ env.VERSION }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        # steps 컨텍스트를 사용하여 이전 단계의 출력에 접근: https://docs.github.com/ko/actions/learn-github-actions/contexts#steps-context
        with:
          name: app-release-${{ steps.get_version.outputs.version }}
          path: build/libs/*.jar
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ needs.build.outputs.version }}
          path: ./artifacts

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to remote server
        id: deploy
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
          APP_NAME: seesaw-web-${{ needs.build.outputs.version }}.jar
        run: |
          echo "원격 서버에 배포를 시작합니다..."
          # 오류 처리 설정
          set -e

          # SSH 연결 확인
          echo "SSH 연결 확인 중..."
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "echo '연결 성공'"

          # 배포 디렉토리 생성 (없는 경우)
          echo "배포 디렉토리 확인 중..."
          ssh $REMOTE_USER@$REMOTE_HOST "mkdir -p $REMOTE_DIR"

          # JAR 파일 전송
          echo "JAR 파일 전송 중..."
          find ./artifacts -name "*.jar" -type f -exec ls -la {} \;
          JAR_FILE=$(find ./artifacts -name "*.jar" -type f | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "오류: JAR 파일을 찾을 수 없습니다."
            exit 1
          fi

          echo "전송할 JAR 파일: $JAR_FILE"
          scp "$JAR_FILE" $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR/$APP_NAME

          echo "배포가 완료되었습니다."
          echo "deployed=true" >> $GITHUB_OUTPUT


      - name: Restart application
        if: steps.deploy.outputs.deployed == 'true'
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
          APP_NAME: seesaw-web-${{ needs.build.outputs.version }}.jar
        run: |
          echo "애플리케이션 재시작 중..."
          ssh $REMOTE_USER@$REMOTE_HOST "cd $REMOTE_DIR && \
            # 기존 애플리케이션 종료
            echo \"애플리케이션 종료 중...\" && \
            ./shutdown.sh && \

            # 새 애플리케이션 시작
            echo \"애플리케이션 시작 중...\" && \
            ./startup.sh $APP_NAME && \
            echo \"애플리케이션이 재시작되었습니다.\"
          "

      - name: Verify application
        if: steps.deploy.outputs.deployed == 'true'
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          APP_PORT: ${{ secrets.APP_PORT || '8080' }}
          HEALTH_ENDPOINT: ${{ secrets.HEALTH_ENDPOINT || '/actuator/health' }}
          MAX_RETRIES: 10
        run: |
          echo "애플리케이션 상태 확인 중..."

          # 애플리케이션이 시작될 때까지 대기
          sleep 10

          # 애플리케이션 프로세스 확인
          ssh $REMOTE_USER@$REMOTE_HOST "ps -ef | grep java | grep seesaw-web | grep -v grep" || {
            echo "오류: 애플리케이션 프로세스가 실행 중이지 않습니다."
            exit 1
          }

          # 애플리케이션 상태 확인 (Spring Boot Actuator 사용 시)
          if [[ ! -z "$HEALTH_ENDPOINT" ]]; then
            RETRY=0
            while [ $RETRY -lt $MAX_RETRIES ]; do
              HEALTH_STATUS=$(ssh $REMOTE_USER@$REMOTE_HOST "curl -s -o /dev/null -w '%{http_code}' http://localhost:$APP_PORT$HEALTH_ENDPOINT" || echo "000")

              if [ "$HEALTH_STATUS" == "200" ]; then
                echo "애플리케이션이 정상적으로 실행 중입니다."
                break
              else
                echo "애플리케이션이 아직 준비되지 않았습니다. 상태 코드: $HEALTH_STATUS (재시도 $RETRY/$MAX_RETRIES)"
                RETRY=$((RETRY+1))
                sleep 5
              fi

              if [ $RETRY -eq $MAX_RETRIES ]; then
                echo "오류: 애플리케이션이 정상적으로 시작되지 않았습니다."
                exit 1
              fi
            done
          fi

          echo "애플리케이션 검증이 완료되었습니다."

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "배포가 성공적으로 완료되었습니다."
            echo "버전: ${{ needs.build.outputs.version }}"
            echo "배포 시간: $(date)"
          else
            echo "배포 중 오류가 발생했습니다."
            echo "상태: ${{ job.status }}"
          fi
