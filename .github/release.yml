# GitHub Auto‑generated Release Notes 설정 - SEESAW-WEB
# 문서: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - duplicate
      - question
  categories:
    - title: "✨ 새로운 Web 기능 (New Web Features)"
      labels:
        - enhancement
        - web

    - title: "🐛 Web 버그 수정 (Web Bug Fixes)"
      labels:
        - bug
        - web

    - title: "📝 Web 문서 (Web Documentation)"
      labels:
        - documentation
        - web

    - title: "⚙️ 기타 변경 (Other Changes)"
      labels:
        - "*"
