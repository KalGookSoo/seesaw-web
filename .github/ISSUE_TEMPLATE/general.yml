name: 일반 이슈 - Web
description: 질문이 아닌 일반적인 Web 작업/개선/토론 이슈를 등록하세요.
title: "[Web 이슈] "
labels: [web]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: 이슈 설명
      description: 무엇을 해결하려는지, 어떤 문제가 있는지 명확히 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 현재 상황
      description: 현재 동작/상태를 구체적으로 적어 주세요.
  - type: textarea
    id: expected
    attributes:
      label: 기대하는 결과
      description: 완료 후 기대하는 결과를 적어 주세요.
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 이슈가 없는지 검색했습니다
          required: true
