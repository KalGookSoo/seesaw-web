name: 버그 리포트 - Web
description: Web 모듈의 버그를 보고하세요.
title: "[Web 버그] "
labels: [bug, web]
assignees: []
body:
  - type: input
    id: scenario_title
    attributes:
      label: 시나리오 제목
      description: 어떤 상황의 버그인지 한 줄로 요약하세요.
      placeholder: 예) 로그인 페이지 레이아웃 깨짐
    validations:
      required: true
  - type: textarea
    id: given
    attributes:
      label: Given(전제 조건)
      description: 버그 재현 전 상태/데이터/환경.
      placeholder: |
        예)
        - 브라우저: Chrome 130
        - 화면 크기: 1920x1080
    validations:
      required: true
  - type: textarea
    id: when
    attributes:
      label: When(행동)
      description: 사용자가 수행한 구체적 행동을 단계로 작성하세요.
      placeholder: |
        예)
        1) 로그인 페이지 접속
        2) 화면 크기 조정
    validations:
      required: true
  - type: textarea
    id: then_expected
    attributes:
      label: Then(기대 결과)
      description: 정상이라면 어떻게 보여야 하는지.
      placeholder: |
        예) 레이아웃이 정상적으로 표시되어야 함
    validations:
      required: true
  - type: textarea
    id: but_actual
    attributes:
      label: But(실제 결과)
      description: 실제로 관찰된 결과를 정확히 적어 주세요.
      placeholder: |
        예) 레이아웃이 깨져서 표시됨
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 환경 정보
      description: OS, 브라우저, 화면 크기 등
      placeholder: |
        - OS: macOS 14.5
        - 브라우저: Chrome 130
        - 화면 크기: 1920x1080
  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷(선택)
      description: 문제를 보여주는 스크린샷을 첨부하세요.
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 이슈를 검색했습니다
          required: true
        - label: 재현 절차와 환경 정보를 기입했습니다
          required: true
