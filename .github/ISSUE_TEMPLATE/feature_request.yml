name: 기능 요청 - Web
description: 새로운 Web 기능/개선을 제안해 주세요.
title: "[Web 기능] "
labels: [enhancement, web]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 기능 요약
      description: 제안하는 Web 기능을 한두 문장으로 요약해 주세요.
      placeholder: 예) 다크 모드를 추가합니다.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 문제/배경
      description: 어떤 문제나 니즈 때문에 이 기능이 필요한가요?
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방향
      description: 구현 아이디어나 원하는 동작을 간단히 적어 주세요.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 제안을 검색했습니다
          required: true
        - label: 기능 범위를 간단히 정리했습니다
          required: true
