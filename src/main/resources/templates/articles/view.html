<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      layout:decorate="~{layout}"
      th:lang="${#locale.language}"
>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>홈 | 대전포스트잇 ♣대전독서모임</title>
    <link rel="stylesheet" href="/static/styles/content.css" th:href="@{/styles/content.css}">
    <script th:inline="javascript"></script>
</head>
<body layout:fragment="content">
<nav th:replace="~{components/local_navigation_bar :: localNavigationBar}"></nav>
<header class="container-sm title-section">
    <div class="d-flex">
        <h4 class="title d-inline-block pb-2" th:text="${CURRENT_CATEGORY.name}"></h4>
    </div>
    <hr>
</header>
<section class="container-sm article-title-section d-flex justify-content-between align-items-center">
    <div th:text="${page.content.get(0).title}"></div>
    <div class="d-flex justify-content-start align-items-center">
        <small class="text-muted" th:text="${page.content.get(0).maskedAuthor}"></small>
        <small class="text-muted mx-2">|</small>
        <small class="text-muted" th:text="${#temporals.format(page.content.get(0).createdDate, 'yyyy.MM.dd')}"></small>
    </div>
</section>
<section class="container-sm article-content-section" th:utext="${page.content.get(0).content}"></section>
<section class="container-sm reply-section">

</section>
<footer class="container-sm content-footer d-flex justify-content-between align-items-center">
    <div class="d-flex justify-content-start">
        <a class="btn" th:href="@{/articles/view(categoryId=${CURRENT_CATEGORY.id}, page=${page.previousOrFirstPageable().pageNumber})}">이전글</a>
        <a class="btn" th:href="@{/articles(categoryType=${CURRENT_CATEGORY.type}, categoryId=${CURRENT_CATEGORY.id})}">목록보기</a>
        <a class="btn" th:href="@{/articles/view(categoryId=${CURRENT_CATEGORY.id}, page=${page.nextOrLastPageable().pageNumber})}">다음글</a>
    </div>
    <div class="d-flex justify-content-end">
        <a href="#" class="btn">수정</a>
        <button type="submit" class="btn">삭제</button>
    </div>
</footer>
</body>
</html>
