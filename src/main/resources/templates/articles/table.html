<!DOCTYPE html>
<html lang="ko"
      layout:decorate="~{layout}"
      th:lang="${#locale.language}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      xmlns:th="http://www.thymeleaf.org"
>
<!--/*@thymesVar id="REQUEST_URI_BUILDER" type="org.springframework.web.util.UriComponentsBuilder"*/-->


<!--/*@thymesVar id="CSRF" type="org.springframework.security.web.csrf.CsrfToken"*/-->
<!--/*@thymesVar id="_csrf" type="org.springframework.security.web.csrf.CsrfToken"*/-->
<!--/*@thymesVar id="search" type="kr.me.seesaw.request.search.SearchArticlesRequest"*/-->
<!--/*@thymesVar id="page" type="org.springframework.data.domain.Page<kr.me.seesaw.response.ArticleResponse>"*/-->
<!--/*@thymesVar id="article" type="kr.me.seesaw.response.ArticleResponse"*/-->
<!--/*@thymesVar id="fixedArticles" type="java.util.List<kr.me.seesaw.response.ArticleResponse>"*/-->
<!--/*@thymesVar id="keyField" type="java.lang.String"*/-->
<!--/*@thymesVar id="keyWord" type="java.lang.String"*/-->
<!--/*@thymesVar id="categoryId" type="java.lang.String"*/-->
<!--/*@thymesVar id="categoryType" type="kr.me.seesaw.domain.vo.CategoryType"*/-->
<!--/*@thymesVar id="viewType" type="java.lang.String"*/-->
<head>

  <meta name="description"
        th:content="|${@siteContext.site.name} ${selectedCategory.name} ${selectedCategory.description != null ? selectedCategory.description : ''}|">
  <meta name="keywords"
        th:content="|${@siteContext.site.name} ${selectedCategory.name} ${selectedCategory.description != null ? selectedCategory.description : ''}|">

  <meta content="website" property="og:type">
  <meta content="페이지 제목" property="og:title" th:content="|${@siteContext.site.name} ${selectedCategory.name}|">
  <meta content="페이지 설명" property="og:description"
        th:content="|${@siteContext.site.name} ${selectedCategory.name} ${selectedCategory.description != null ? selectedCategory.description : ''}|">
  <meta content="페이지 썸네일 이미지 주소" property="og:image" th:content="${REQUEST_URI_BUILDER.cloneBuilder().replacePath('/api/attachments/' + @siteContext.site.profileImage.id).replaceQuery(null).build().toUriString()}"
        th:if="${@siteContext.site.profileImage != null}">
  <meta content="페이지 주소" property="og:url" th:content="${REQUEST_URI_BUILDER.cloneBuilder().toUriString()}">

  <meta content="summary" property="twitter:card">
  <meta content="페이지 제목" property="twitter:title" th:content="|${@siteContext.site.name}  ${selectedCategory.name}|">
  <meta content="페이지 설명" property="twitter:description"
        th:content="|${@siteContext.site.name} ${selectedCategory.name} ${selectedCategory.description != null ? selectedCategory.description : ''}|">
  <meta content="페이지 썸네일 이미지 주소" property="twitter:image" th:content="${REQUEST_URI_BUILDER.cloneBuilder().replacePath('/api/attachments/' + @siteContext.site.profileImage.id).replaceQuery(null).build().toUriString()}"
        th:if="${@siteContext.site.profileImage != null}">

  <title th:text="${selectedCategory.name + '|' + @siteContext.site.name}"></title>
  <link href="/static/styles/content.css" rel="stylesheet" th:href="@{/styles/content.css}">
  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', e => {
      e.target.addEventListener('click', e => {
        const deleteButton = e.target.closest(`[name="delete"]`);
        if (deleteButton) {
          const checkboxes = document.querySelectorAll(`[name="selected"]:checked`);
          const ids = [...checkboxes].map(checkbox => checkbox.dataset.id);
          const httpEntity = {
            method: 'delete',
            headers: {
              'content-type': 'application/json',
              [CSRF.headerName]: CSRF.token
            },
            body: JSON.stringify(ids)
          };
          fetch(`/api/articles`, httpEntity)
            .then(async response => {
              const responseBody = await response.text();
              if (response.ok) {
                alert(/*[[#{command.success.delete}]]*/'');
                location.reload();
              } else {
                alert(/*[[#{command.failure.delete}]]*/'');
              }
            });
        }
      });

      e.target.addEventListener('change', e => {
        if (e.target.name === 'selectAll') {
          const checkboxes = e.target.closest(`.board-table-section table`).querySelectorAll(`[name="selected"]`);
          [...checkboxes].forEach(checkbox => checkbox.checked = e.target.checked);
        }
      });
    });
  </script>
</head>

<div layout:fragment="content">
  <section th:replace="~{components/breadcrumb :: breadcrumbs}"></section>
  <section class="container-sm title-section">
    <div class="d-flex justify-content-between">
      <h5 class="title" th:text="${selectedCategory.name}"></h5>
      <div class="d-flex">
        <div>
          <a class="btn d-flex align-items-center"
             th:classappend="${#strings.equals(search.viewType, 'TABLE')} ? 'main-color' : ''"
             th:href="${REQUEST_URI_BUILDER.cloneBuilder().replaceQueryParam('page', page.pageable.pageNumber).replaceQueryParam('viewType', 'TABLE').build().toUriString()}"
             th:title="#{label.view.list}"
          >
            <i class="bi bi-list"></i><span class="d-none d-sm-inline ms-1" th:text="#{label.view.list}">목록보기</span>
          </a>
        </div>
        <div>
          <a class="btn d-flex align-items-center"
             th:classappend="${#strings.equals(search.viewType, 'CARD')} ? 'main-color' : ''"
             th:href="${REQUEST_URI_BUILDER.cloneBuilder().replaceQueryParam('page', page.pageable.pageNumber).replaceQueryParam('viewType', 'CARD').build().toUriString()}"
             th:title="#{label.view.card}"
          >
            <i class="bi bi-grid"></i><span class="d-none d-sm-inline ms-1" th:text="#{label.view.card}">카드보기</span>
          </a>
        </div>
      </div>
    </div>
  </section>
  <section class="container-sm board-table-section">
    <table class="table table-hover small">
      <caption class="d-none" th:text="|#{entity.article} #{label.list}|"></caption>
      <colgroup>
        <col sec:authorize="hasRole('ROLE_ADMIN') or hasRole('ROLE_MANAGER')" style="width: 52px">
        <col style="width: 52px">
        <col>
      </colgroup>
      <thead>
      <tr>
        <th class="py-3 text-center align-middle" scope="col" sec:authorize="hasRole('ROLE_ADMIN') or hasRole('ROLE_MANAGER')">
          <input name="selectAll" th:aria-label="#{label.select}" type="checkbox">
        </th>
        <th class="py-3 text-center align-middle" scope="col" th:text="#{label.no}"></th>
        <th class="py-3 text-center align-middle" scope="col" th:text="#{entity.article.title}"></th>
      </tr>
      </thead>
      <tbody>
      <!--/* 공지 */-->
      <tr th:each="article, articleStat : ${fixedArticles}" th:if="${!fixedArticles.isEmpty()}">
        <td class="py-3 text-center align-middle" sec:authorize="hasRole('ROLE_ADMIN') or hasRole('ROLE_MANAGER')">
          <input name="selected" th:aria-label="#{label.select}" th:data-id="${article.id}" type="checkbox">
        </td>
        <td class="py-3 text-center align-middle">📣</td>
        <td class="py-3 text-start">
          <div>
            <a class="none d-flex align-items-center gap-2"
               th:href="${REQUEST_URI_BUILDER.cloneBuilder().replacePath('/articles/' + article.id).build().toUriString()}">
              [[${article.title}]]
              <span class="badge bg-primary ms-1" th:if="${article.isRecentlyGenerated()}" th:text="#{label.new}">New</span>
            </a>
          </div>
          <div class="small text-muted mt-1">
            <span th:text="${article.maskedAuthor}"></span>
            <span class="mx-1">|</span>
            <span th:text="${#temporals.format(article.createdDate, 'yyyy.MM.dd')}"></span>
            <th:block th:if="${!article.replies.isEmpty()}">
              <span class="mx-1">|</span>
              <i class="bi bi-chat-dots mx-1"></i><span th:text="${article.replies.size()}"></span>
            </th:block>
            <th:block sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')">
              <span class="mx-1">|</span>
              <i class="bi bi-eye mx-1"></i><span th:text="${article.views.size()}"></span>
            </th:block>
          </div>
        </td>
      </tr>
      <!--/* 비공지 */-->
      <tr th:each="article, articleStat : ${page.content}" th:if="${page.hasContent() and !article.isFixed}">
        <td class="py-3 text-center align-middle" sec:authorize="hasRole('ROLE_ADMIN') or hasRole('ROLE_MANAGER')">
          <input name="selected" th:aria-label="#{label.select}" th:data-id="${article.id}" type="checkbox">
        </td>
        <td class="py-3 text-center align-middle" th:text="${page.totalElements - page.pageable.offset - articleStat.index}"></td>
        <td class="py-3 text-start">
          <div>
            <a class="none d-flex align-items-center gap-2"
               th:href="${REQUEST_URI_BUILDER.cloneBuilder().replacePath('/articles/' + article.id).build().toUriString()}">
              [[${article.title}]]
              <span class="badge bg-primary ms-1" th:if="${article.isRecentlyGenerated()}" th:text="#{label.new}">New</span>
            </a>
          </div>
          <div class="small text-muted mt-1">
            <span th:text="${article.maskedAuthor}"></span>
            <span class="mx-1">|</span>
            <span th:text="${#temporals.format(article.createdDate, 'yyyy.MM.dd')}"></span>
            <th:block th:if="${!article.replies.isEmpty()}">
              <span class="mx-1">|</span>
              <i class="bi bi-chat-dots mx-1"></i><span th:text="${article.replies.size()}"></span>
            </th:block>
            <th:block sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')">
              <span class="mx-1">|</span>
              <i class="bi bi-eye mx-1"></i><span th:text="${article.views.size()}"></span>
            </th:block>
          </div>
        </td>
      </tr>
      </tbody>
      <tbody th:if="${page.isEmpty() and fixedArticles.isEmpty()}">
      <tr>
        <td class="text-center" colspan="3">
          <div class="text-center d-flex justify-content-center align-items-center my-2" th:text="#{label.result.empty}"></div>
        </td>
      </tr>
      </tbody>
    </table>
  </section>
  <!--/* Buttons and pagination */-->
  <section class="container-sm my-3">
    <div class="d-flex justify-content-between">
      <div>
        <button class="btn btn-outline-secondary d-flex align-items-center" name="delete"
                sec:authorize="hasRole('ROLE_ADMIN') or hasRole('ROLE_MANAGER')" th:title="#{label.delete.selected}" type="button">
          <i class="bi bi-trash"></i><span class="d-none d-sm-inline ms-1" th:text="#{label.delete.selected}">선택삭제</span>
        </button>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary d-flex align-items-center"
           sec:authorize="isAuthenticated()"
           th:href="${REQUEST_URI_BUILDER.cloneBuilder()
           .replacePath('/articles')
           .replaceQueryParam('page', 0)
           .replaceQueryParam('keyField', 'createdBy')
           .replaceQueryParam('keyWord', #authentication.principal.username)
           .build()
           .toUriString()}"
           th:title="#{label.my.articles}"
        >
          <i class="bi bi-person"></i><span class="d-none d-sm-inline ms-1" th:text="#{label.my.articles}">내가 쓴 글</span>
        </a>
        <a class="btn btn-primary d-flex align-items-center"
           th:href="${REQUEST_URI_BUILDER.cloneBuilder().replacePath('/articles/new').build().toUriString()}"
           th:if="${#authentication.isAuthenticated() and (#authorization.expression('hasAnyRole(''ROLE_ADMIN'', ''ROLE_MANAGER'')') or @categoryPermissionEvaluator.hasPermission(selectedCategory.id, T(org.springframework.security.acls.domain.BasePermission).WRITE))}"
           th:title="#{label.write}"
        >
          <i class="bi bi-pencil-square"></i><span class="d-none d-sm-inline ms-1" th:text="#{label.write}">글쓰기</span>
        </a>
        <a class="btn btn-primary d-flex align-items-center" sec:authorize="isAnonymous()"
           th:href="@{/oauth2/authorization/naver}"
           th:title="#{label.write}"
        >
          <i class="bi bi-pencil-square"></i><span class="d-none d-sm-inline ms-1" th:text="#{label.write}">글쓰기</span>
        </a>
      </div>
    </div>
  </section>

  <!--/* Pagination row */-->
  <section class="container-sm my-3">
    <div class="d-flex justify-content-center">
      <nav class="pagination" th:aria-label="#{label.page.navigation}">
        <ul class="pagination mb-0">
          <li class="page-item" th:classappend="${page.first} ? 'disabled' : ''">
            <a class="page-link"
               th:aria-label="#{label.page.previous}"
               th:href="${REQUEST_URI_BUILDER.cloneBuilder().replaceQueryParam('page', page.previousOrFirstPageable().pageNumber).build().toUriString()}"
               th:title="#{label.page.previous}"
            >
              <i class="bi bi-chevron-left"></i>
            </a>
          </li>

          <li class="page-item d-none d-sm-block"
              th:classappend="${pageNumber == page.number} ? 'active' : ''"
              th:each="pageNumber : ${#numbers.sequence(0, page.totalPages - (page.totalPages > 0 ? 1 : 0))}">
            <a class="page-link"
               th:href="${REQUEST_URI_BUILDER.cloneBuilder().replaceQueryParam('page', pageNumber).build().toUriString()}"
               th:text="${pageNumber + 1}">
            </a>
          </li>

          <li class="page-item d-sm-none" th:if="${!page.isEmpty()}">
            <span class="page-link">
                <span th:text="${page.number + 1}"></span> / <span th:text="${page.totalPages}"></span>
            </span>
          </li>

          <li class="page-item" th:classappend="${page.last} ? 'disabled' : ''">
            <a class="page-link"
               th:aria-label="#{label.page.next}"
               th:href="${REQUEST_URI_BUILDER.cloneBuilder().replaceQueryParam('page', page.nextOrLastPageable().pageNumber).build().toUriString()}"
               th:title="#{label.page.next}"
            >
              <i class="bi bi-chevron-right"></i>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </section>
  <section class="container-sm board-table-search-section my-4">
    <form class="row g-2 justify-content-center" name="searchForm" th:action="@{/articles}" th:method="get" th:object="${search}">
      <input th:field="*{categoryId}" type="hidden">
      <input th:field="*{categoryType}" type="hidden">
      <input th:field="*{viewType}" type="hidden">
      <div class="col-12 col-sm-3 col-md-2">
        <select class="form-select" th:aria-label="#{label.search.field.select}" th:field="*{keyField}">
          <option th:text="#{entity.article.title}" value="title"></option>
          <option th:text="#{entity.article.content}" value="content"></option>
          <option th:text="#{entity.article.createdBy}" value="createdBy"></option>
        </select>
      </div>
      <div class="col-12 col-sm-6 col-md-4">
        <div class="input-group">
          <input class="form-control" th:aria-label="#{label.search.keyword}" th:field="*{keyWord}" th:placeholder="#{placeholder.search.keyword}"
                 type="search">
          <button class="btn btn-outline-secondary d-flex align-items-center" th:title="#{label.search}" type="submit">
            <i class="bi bi-search"></i><span class="d-none d-sm-inline ms-1" th:text="#{label.search}">검색</span>
          </button>
        </div>
      </div>
    </form>
  </section>
</div>
</html>
