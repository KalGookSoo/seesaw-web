<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신고 접수</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background-color: #f4f6f9;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    .mail-wrapper {
      max-width: 620px;
      margin: 40px auto;
    }

    .mail-header {
      background: linear-gradient(135deg, #dc3545 0%, #b02a37 100%);
      border-radius: 12px 12px 0 0;
      padding: 32px 36px;
      color: #fff;
    }

    .mail-header .badge-label {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .mail-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0;
      line-height: 1.4;
    }

    .mail-body {
      background: #fff;
      border-left: 1px solid #e3e6ea;
      border-right: 1px solid #e3e6ea;
      padding: 32px 36px;
    }

    .info-row {
      display: flex;
      gap: 8px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 0.9rem;
    }

    .info-row:last-of-type {
      border-bottom: none;
    }

    .info-label {
      color: #6c757d;
      font-weight: 600;
      min-width: 90px;
      flex-shrink: 0;
    }

    .info-value {
      color: #212529;
      word-break: break-all;
    }

    .content-box {
      background: #f8f9fa;
      border-left: 4px solid #dc3545;
      border-radius: 0 6px 6px 0;
      padding: 16px 20px;
      margin-top: 24px;
      font-size: 0.9rem;
      color: #343a40;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }

    .mail-footer {
      background: #f8f9fa;
      border: 1px solid #e3e6ea;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 20px 36px;
      text-align: center;
      font-size: 0.78rem;
      color: #adb5bd;
    }
  </style>
</head>
<body>
  <div class="mail-wrapper">

    <!-- 헤더 -->
    <div class="mail-header">
      <span class="badge-label"><i class="bi bi-shield-exclamation"></i> 신고 접수</span>
      <h1 th:text="${title}">신고 제목</h1>
    </div>

    <!-- 본문 -->
    <div class="mail-body">
      <p class="text-muted mb-4" style="font-size: 0.85rem;">
        아래 내용으로 신고가 접수되었습니다. 확인 후 적절한 조치를 취해주세요.
      </p>

      <!-- 발신자 정보 -->
      <div class="info-row">
        <span class="info-label"><i class="bi bi-person-fill text-danger me-1"></i> 신고자</span>
        <span class="info-value" th:text="${from}">신고자 이메일</span>
      </div>

      <!-- 사이트 정보 -->
      <div class="info-row">
        <span class="info-label"><i class="bi bi-globe2 text-secondary me-1"></i> 사이트</span>
        <span class="info-value" th:text="${siteName}">사이트명</span>
      </div>

      <!-- 제목 -->
      <div class="info-row">
        <span class="info-label"><i class="bi bi-tag-fill text-secondary me-1"></i> 제목</span>
        <span class="info-value" th:text="${title}">신고 제목</span>
      </div>

      <!-- 신고 내용 -->
      <div class="mt-4">
        <p class="fw-semibold mb-2" style="font-size: 0.85rem; color: #495057;">
          <i class="bi bi-chat-left-text-fill text-danger me-1"></i> 신고 내용
        </p>
        <div class="content-box" th:text="${content}">신고 내용이 여기에 표시됩니다.</div>
      </div>
    </div>

    <!-- 푸터 -->
    <div class="mail-footer">
      <p class="mb-1">이 메일은 <strong>Seesaw</strong> 서비스에서 자동으로 발송된 메일입니다.</p>
      <p class="mb-0">회신하시면 신고자 이메일로 직접 답장됩니다.</p>
    </div>

  </div>
</body>
</html>
