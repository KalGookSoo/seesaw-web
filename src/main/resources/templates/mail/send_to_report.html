<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신고 접수</title>
</head>
<body style="margin:0;padding:0;background-color:#f8fafc;color:#0f172a;font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;">
<div class="page" style="padding:40px 16px;background-color:#f8fafc;">
  <div class="mail" style="width:100%;max-width:620px;margin:0 auto;">
    <div class="header" style="padding:32px 36px;background-color:#dc2626;border-radius:12px 12px 0 0;color:#ffffff;">
      <div class="badge" style="display:inline-block;margin-bottom:12px;padding:5px 12px;border-radius:999px;background-color:#f87171;color:#ffffff;font-size:12px;font-weight:700;line-height:18px;letter-spacing:0.06em;">신고 접수</div>
      <h1 class="title" style="margin:0;color:#ffffff;font-size:22px;font-weight:800;line-height:1.45;" th:text="${title}">신고 제목</h1>
    </div>

    <div class="body" style="padding:32px 36px;background-color:#ffffff;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;">
      <p class="summary" style="margin:0 0 24px;color:#64748b;font-size:14px;line-height:1.7;">아래 내용으로 신고가 접수되었습니다. 확인 후 적절한 조치를 취해주세요.</p>

      <div class="info-list">
        <div class="info-row" style="display:flex;gap:8px;padding:13px 0;border-bottom:1px solid #f1f5f9;">
          <div class="info-label" style="flex:0 0 96px;color:#64748b;font-size:14px;font-weight:700;line-height:1.5;white-space:nowrap;">신고자</div>
          <div class="info-value info-value-email" style="flex:1 1 auto;min-width:0;color:#0f172a;font-size:14px;line-height:1.5;word-break:break-all;" th:text="${from}">신고자 이메일</div>
        </div>
        <div class="info-row" style="display:flex;gap:8px;padding:13px 0;border-bottom:1px solid #f1f5f9;">
          <div class="info-label" style="flex:0 0 96px;color:#64748b;font-size:14px;font-weight:700;line-height:1.5;white-space:nowrap;">사이트</div>
          <div class="info-value" style="flex:1 1 auto;min-width:0;color:#0f172a;font-size:14px;line-height:1.5;word-break:break-word;" th:text="${siteName}">사이트명</div>
        </div>
        <div class="info-row" style="display:flex;gap:8px;padding:13px 0;border-bottom:0;">
          <div class="info-label" style="flex:0 0 96px;color:#64748b;font-size:14px;font-weight:700;line-height:1.5;white-space:nowrap;">제목</div>
          <div class="info-value" style="flex:1 1 auto;min-width:0;color:#0f172a;font-size:14px;line-height:1.5;word-break:break-word;" th:text="${title}">신고 제목</div>
        </div>
      </div>

      <div class="content-section" style="margin-top:28px;">
        <p class="content-title" style="margin:0 0 10px;color:#334155;font-size:14px;font-weight:700;line-height:1.5;">신고 내용</p>
        <div class="content-box" style="padding:16px 20px;background-color:#f8fafc;border-left:4px solid #dc2626;border-radius:0 8px 8px 0;color:#334155;font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;" th:text="${content}">신고 내용이 여기에 표시됩니다.</div>
      </div>
    </div>

    <div class="footer" style="padding:20px 36px;background-color:#f8fafc;border:1px solid #e2e8f0;border-top:0;border-radius:0 0 12px 12px;color:#94a3b8;font-size:12px;line-height:1.7;text-align:center;">
      <p style="margin:0;">이 메일은 <strong style="color:#64748b;font-weight:700;">Seesaw</strong> 서비스에서 자동으로 발송된 메일입니다.</p>
      <p style="margin:4px 0 0;">회신하시면 신고자 이메일로 직접 답장됩니다.</p>
    </div>
  </div>
</div>
</body>
</html>
