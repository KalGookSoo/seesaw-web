<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 게시글 알림</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #f8f9fa; color: #343a40; }
        .container { max-width: 600px; margin: 30px auto; background-color: #ffffff; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .header { background-color: #007bff; color: #ffffff; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .footer { background-color: #e9ecef; color: #6c757d; padding: 15px; text-align: center; font-size: 0.8em; }
        .btn-primary { background-color: #007bff; border-color: #007bff; padding: 10px 20px; border-radius: 5px; text-decoration: none; color: #ffffff; display: inline-block; margin-top: 20px; }
        .btn-primary:hover { background-color: #0056b3; border-color: #0056b3; }
        .card { border: 1px solid #dee2e6; border-radius: 5px; margin-bottom: 20px; }
        .card-header { background-color: #f1f3f5; padding: 10px 15px; font-weight: bold; }
        .card-body { padding: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>📝 새 게시글이 등록되었습니다</h2>
    </div>
    <div class="content">
        <p>안녕하세요, 관리자님.</p>
        <p>새로운 게시글이 등록되어 알려드립니다.</p>

        <div class="card">
            <div class="card-header">게시글 정보</div>
            <div class="card-body">
                <p><strong>제목:</strong> <span th:text="${title}">게시글 제목</span></p>
                <p><strong>내용 미리보기:</strong></p>
                <div style="background-color: #f8f9fa; border: 1px solid #e9ecef; padding: 10px; border-radius: 5px; white-space: pre-wrap; word-break: break-word;">
                    <span th:text="${content}">HTML 파싱 없이 100자 절삭된 본문 미리보기</span>
                </div>
            </div>
        </div>

        <p class="text-center">
            <a th:href="${articleUrl}" class="btn btn-primary">게시글 보러가기 →</a>
        </p>

        <p style="margin-top: 30px; font-size: 0.9em; color: #6c757d;">
            본 메일은 시스템에서 자동으로 발송된 메일입니다.
        </p>
    </div>
    <div class="footer">
        &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> Seesaw Project. All rights reserved.
    </div>
</div>
</body>
</html>
