<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>헬프데스크 문의</title>
</head>
<body style="margin:0; padding:0; background-color:#f8fafc; font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif; color:#0f172a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse; background-color:#f8fafc;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width:100%; max-width:620px; border-collapse:collapse;">
          <tr>
            <td style="padding:32px 36px; background-color:#2563eb; border-radius:12px 12px 0 0; color:#ffffff;">
              <div style="display:inline-block; margin-bottom:12px; padding:5px 12px; border-radius:999px; background-color:#60a5fa; color:#ffffff; font-size:12px; font-weight:700; line-height:18px; letter-spacing:0.06em;">
                헬프데스크 문의
              </div>
              <h1 style="margin:0; color:#ffffff; font-size:22px; font-weight:800; line-height:1.45;" th:text="${title}">문의 제목</h1>
            </td>
          </tr>

          <tr>
            <td style="padding:32px 36px; background-color:#ffffff; border-left:1px solid #e2e8f0; border-right:1px solid #e2e8f0;">
              <p style="margin:0 0 24px; color:#64748b; font-size:14px; line-height:1.7;">
                아래 내용으로 헬프데스크 문의가 접수되었습니다. 확인 후 회신해주세요.
              </p>

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse;">
                <tr>
                  <td width="96" valign="top" style="width:96px; padding:13px 8px 13px 0; border-bottom:1px solid #f1f5f9; color:#64748b; font-size:14px; font-weight:700; line-height:1.5; white-space:nowrap;">
                    문의자
                  </td>
                  <td valign="top" style="padding:13px 0; border-bottom:1px solid #f1f5f9; color:#0f172a; font-size:14px; line-height:1.5; word-break:break-all;" th:text="${from}">
                    문의자 이메일
                  </td>
                </tr>
                <tr>
                  <td width="96" valign="top" style="width:96px; padding:13px 8px 13px 0; border-bottom:1px solid #f1f5f9; color:#64748b; font-size:14px; font-weight:700; line-height:1.5; white-space:nowrap;">
                    사이트
                  </td>
                  <td valign="top" style="padding:13px 0; border-bottom:1px solid #f1f5f9; color:#0f172a; font-size:14px; line-height:1.5; word-break:break-word;" th:text="${siteName}">
                    사이트명
                  </td>
                </tr>
                <tr>
                  <td width="96" valign="top" style="width:96px; padding:13px 8px 13px 0; color:#64748b; font-size:14px; font-weight:700; line-height:1.5; white-space:nowrap;">
                    제목
                  </td>
                  <td valign="top" style="padding:13px 0; color:#0f172a; font-size:14px; line-height:1.5; word-break:break-word;" th:text="${title}">
                    문의 제목
                  </td>
                </tr>
              </table>

              <div style="margin-top:28px;">
                <p style="margin:0 0 10px; color:#334155; font-size:14px; font-weight:700; line-height:1.5;">
                  문의 내용
                </p>
                <div style="padding:16px 20px; background-color:#f8fafc; border-left:4px solid #2563eb; border-radius:0 8px 8px 0; color:#334155; font-size:14px; line-height:1.8; white-space:pre-wrap; word-break:break-word;" th:text="${content}">
                  문의 내용이 여기에 표시됩니다.
                </div>
              </div>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:20px 36px; background-color:#f8fafc; border:1px solid #e2e8f0; border-top:0; border-radius:0 0 12px 12px; color:#94a3b8; font-size:12px; line-height:1.7;">
              <p style="margin:0 0 4px;">이 메일은 <strong style="font-weight:700; color:#64748b;">Seesaw</strong> 서비스에서 자동으로 발송된 메일입니다.</p>
              <p style="margin:0;">회신하시면 문의자 이메일로 직접 답장됩니다.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
