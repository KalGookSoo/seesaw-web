<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 댓글 알림</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f8fafc;
      color: #0f172a;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif;
    }

    .page {
      width: 100%;
      border-collapse: collapse;
      background-color: #f8fafc;
    }

    .page-cell {
      padding: 40px 16px;
      text-align: center;
    }

    .mail {
      width: 100%;
      max-width: 620px;
      border-collapse: collapse;
      margin: 0 auto;
      text-align: left;
    }

    .header {
      padding: 32px 36px;
      background-color: #16a34a;
      border-radius: 12px 12px 0 0;
      color: #ffffff;
    }

    .badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 5px 12px;
      border-radius: 999px;
      background-color: #4ade80;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      line-height: 18px;
      letter-spacing: 0.06em;
    }

    .title {
      margin: 0;
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.45;
    }

    .body {
      padding: 32px 36px;
      background-color: #ffffff;
      border-left: 1px solid #e2e8f0;
      border-right: 1px solid #e2e8f0;
    }

    .intro {
      margin: 0 0 8px;
      color: #334155;
      font-size: 14px;
      line-height: 1.7;
    }

    .intro-muted {
      margin: 0 0 24px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
    }

    .info-card {
      width: 100%;
      margin-top: 24px;
      border-collapse: collapse;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background-color: #ffffff;
    }

    .info-card-header {
      padding: 13px 16px;
      background-color: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      color: #334155;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .info-card-body {
      padding: 16px;
    }

    .field-label {
      margin: 0 0 8px;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }

    .field-value {
      margin: 0 0 18px;
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.6;
      word-break: break-word;
    }

    .preview {
      padding: 16px 20px;
      background-color: #f8fafc;
      border-left: 4px solid #16a34a;
      border-radius: 0 8px 8px 0;
      color: #334155;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .button-wrap {
      padding-top: 28px;
      text-align: center;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 8px;
      background-color: #16a34a;
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
      text-decoration: none;
    }

    .notice {
      margin: 28px 0 0;
      color: #64748b;
      font-size: 13px;
      line-height: 1.7;
    }

    .footer {
      padding: 20px 36px;
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-top: 0;
      border-radius: 0 0 12px 12px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.7;
      text-align: center;
    }
  </style>
</head>
<body>
<table role="presentation" class="page" style="width: 100%; padding: 0;" cellpadding="0" cellspacing="0">
  <tr>
    <td class="page-cell" style="text-align: center;">
      <table role="presentation" class="mail" width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td class="header">
            <div class="badge">새 댓글 알림</div>
            <h1 class="title">새 댓글이 등록되었습니다</h1>
          </td>
        </tr>

        <tr>
          <td class="body">
            <p class="intro">안녕하세요, 관리자님.</p>
            <p class="intro-muted">새로운 댓글이 등록되어 알려드립니다.</p>

            <table role="presentation" class="info-card" width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td class="info-card-header">댓글 정보</td>
              </tr>
              <tr>
                <td class="info-card-body">
                  <p class="field-label">게시글</p>
                  <p class="field-value" th:text="${title}">게시글 제목</p>

                  <p class="field-label">댓글 미리보기</p>
                  <div class="preview" th:text="${contentPreview}">HTML 파싱 없이 100자 절삭된 본문 미리보기</div>
                </td>
              </tr>
            </table>

            <div class="button-wrap">
              <a th:href="${articleUrl}" class="button">댓글 보러가기</a>
            </div>

            <p class="notice">본 메일은 시스템에서 자동으로 발송된 메일입니다.</p>
          </td>
        </tr>

        <tr>
          <td class="footer">
            &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> Seesaw Project. All rights reserved.
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
