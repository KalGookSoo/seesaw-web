<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 댓글 알림</title>
</head>
<body style="margin:0;padding:0;background-color:#f8fafc;color:#0f172a;font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;">
<div class="page" style="padding:40px 16px;background-color:#f8fafc;">
  <div class="mail" style="width:100%;max-width:620px;margin:0 auto;">
    <div class="header" style="padding:32px 36px;background-color:#16a34a;border-radius:12px 12px 0 0;color:#ffffff;">
      <div class="badge" style="display:inline-block;margin-bottom:12px;padding:5px 12px;border-radius:999px;background-color:#4ade80;color:#ffffff;font-size:12px;font-weight:700;line-height:18px;letter-spacing:0.06em;">새 댓글 알림</div>
      <h1 class="title" style="margin:0;color:#ffffff;font-size:22px;font-weight:800;line-height:1.45;">새 댓글이 등록되었습니다</h1>
    </div>

    <div class="body" style="padding:32px 36px;background-color:#ffffff;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;">
      <p class="intro" style="margin:0 0 8px;color:#334155;font-size:14px;line-height:1.7;">안녕하세요, 관리자님.</p>
      <p class="intro-muted" style="margin:0 0 24px;color:#64748b;font-size:14px;line-height:1.7;">새로운 댓글이 등록되어 알려드립니다.</p>

      <div class="info-card" style="margin-top:24px;border:1px solid #e2e8f0;border-radius:8px;background-color:#ffffff;overflow:hidden;">
        <div class="info-card-header" style="padding:13px 16px;background-color:#f1f5f9;border-bottom:1px solid #e2e8f0;color:#334155;font-size:14px;font-weight:800;line-height:1.5;">댓글 정보</div>
        <div class="info-card-body" style="padding:16px;">
          <p class="field-label" style="margin:0 0 8px;color:#64748b;font-size:13px;font-weight:700;line-height:1.5;">게시글</p>
          <p class="field-value" style="margin:0 0 18px;color:#0f172a;font-size:15px;font-weight:700;line-height:1.6;word-break:break-word;" th:text="${title}">게시글 제목</p>

          <p class="field-label" style="margin:0 0 8px;color:#64748b;font-size:13px;font-weight:700;line-height:1.5;">댓글 미리보기</p>
          <div class="preview" style="padding:16px 20px;background-color:#f8fafc;border-left:4px solid #16a34a;border-radius:0 8px 8px 0;color:#334155;font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;" th:text="${content}">HTML 파싱 없이 100자 절삭된 본문 미리보기</div>
        </div>
      </div>

      <div class="button-wrap" style="padding-top:28px;text-align:center;">
        <a th:href="${articleUrl}" class="button" style="display:inline-block;padding:12px 20px;border-radius:8px;background-color:#16a34a;color:#ffffff;font-size:14px;font-weight:800;line-height:1.4;text-decoration:none;">댓글 보러가기</a>
      </div>

      <p class="notice" style="margin:28px 0 0;color:#64748b;font-size:13px;line-height:1.7;">본 메일은 시스템에서 자동으로 발송된 메일입니다.</p>
    </div>

    <div class="footer" style="padding:20px 36px;background-color:#f8fafc;border:1px solid #e2e8f0;border-top:0;border-radius:0 0 12px 12px;color:#94a3b8;font-size:12px;line-height:1.7;text-align:center;">
      &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> Seesaw Project. All rights reserved.
    </div>
  </div>
</div>
</body>
</html>
