<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Header</title>
    <link rel="stylesheet" href="/static/styles/aside.css" th:href="@{/styles/aside.css}">
    <script src="/static/scripts/aside.js" th:src="@{/scripts/aside.js}"></script>
</head>

    <aside id="aside" th:fragment="aside">
        <header class="d-flex align-items-center justify-content-between">
            <div class="aside-header-wrapper d-flex flex-grow-1 justify-content-between">
                <div class="aside-header-content-left">

                </div>
                <div class="aside-header-content-center">
                    <div class="aside-thumb d-flex justify-content-center align-items-center">
                        <img class="w-100 rounded-circle" th:src="@{|/api/attachments/${SITE_CONTEXT.profileImage.id}|}" th:alt="${SITE_CONTEXT.profileImage.originalName}">
                    </div>
                    <div class="logo logo-text">대전포스트잇 ♣대전독서모임</div>
                    <div class="sub-title" sec:authorize="isAuthenticated()" th:text="${#authentication.name}"></div>
                    <div class="functional-wrap">
                        <button type="button" name="">톡톡관리</button>
                    </div>
                </div>
                <div class="aside-header-content-right">
                    <div><button type="button" name="close">✖</button></div>
                </div>
            </div>
        </header>
        <section class="profile d-flex flex-column align-items-center justify-content-center" sec:authorize="hasRole('ROLE_ADMIN') or hasRole('ROLE_MANAGER')">
            <div class="aside-functionality-wrapper">
                <div class="aside-fnc-row">
                    <div class="button-wrap"><button type="button">홈페이지관리</button></div>
                    <div class="button-wrap"><button type="button">방문자통계</button></div>
                    <div class="button-wrap"><button type="button">공동편집권</button></div>
                    <div class="button-wrap"><button type="button">글알림받기</button></div>
                </div>
                <div class="aside-fnc-row">
                    <div class="button-wrap"><button type="button">로그아웃</button></div>
                    <div class="button-wrap"><button type="button">공유하기</button></div>
                    <div class="button-wrap"><button type="button">월간리포트</button></div>
                    <div class="button-wrap"><button type="button">페이지수정</button></div>
                </div>
            </div>

        </section>

        <section class="aside site-map">
            <details class="accordion-item">
                <summary class="accordion-header d-flex justify-content-between align-items-center">
                    <a class="none flex-grow-1" th:href="@{/}">홈</a>
                </summary>
            </details>
            <details th:replace="~{::nestedCategories(${NESTED_CATEGORIES})}"></details>
            <th:block th:fragment="nestedCategories(categories)">
                <details class="accordion-item" th:each="category : ${categories}">
                    <summary class="accordion-header d-flex justify-content-between align-items-center">
                        <a class="none flex-grow-1"
                           th:if="${!category.isRoot()}"
                           th:href="@{/articles(categoryType=${category.type}, categoryId=${category.id})}"
                           th:text="${category.name}"
                        ></a>
                        <span type="button" class="flex-grow-1" th:if="${category.isRoot()}" th:text="${category.name}"></span>
                        <span class="accordion-icon" th:if="${!#lists.isEmpty(category.children)}"></span>
                    </summary>
                    <details th:if="${!#lists.isEmpty(category.children)}"
                             th:replace="~{::nestedCategories(${category.children})}">
                    </details>
                </details>
            </th:block>
        </section>
        <footer class="copyright">ⓒ daejeonstickybook powered by doyevskyi</footer>
    </aside>

</html>
