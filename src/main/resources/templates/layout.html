<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:lang="${#locale.language}"
>

<!--/*@thymesVar id="CSRF" type="org.springframework.security.web.csrf.CsrfToken"*/-->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <meta name="robots" content="index, follow">

  <meta name="google-site-verification" content="SmP65FAXUDTeiNBaujsGFx3c2dbyNPze6Fu0FLDlCnY">

  <meta name="theme-color" th:content="${@siteContext.site.themeColor}">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" th:content="${@siteContext.site.name}">
  <meta name="seesaw-authenticated" th:content="${#authorization.expression('isAuthenticated()')}">
  <meta name="seesaw-site-id" th:content="${@siteContext.site.id}">

  <meta name="naver-site-verification" content="3d44ef25fe0fdc4aa0c39c38f36b5c0b1ac0d87b">

  <title>홈 | 대전포스트잇 ♣대전독서모임</title>

  <!--/* CSS */-->
  <!--/*@thymesVar id="REQUEST_URI_BUILDER" type="org.springframework.web.util.UriComponentsBuilder"*/-->
  <link rel="canonical" th:href="${REQUEST_URI_BUILDER.cloneBuilder().toUriString()}">
  <link rel="manifest" th:href="@{/manifest.webmanifest}">
  <link rel="icon" th:href="@{/favicon.png}">
  <link rel="stylesheet" th:href="@{/styles/bootstrap.css}">
  <link rel="stylesheet" th:href="@{/styles/bootstrap-icons.min.css}">
  <link rel="stylesheet" th:href="@{/styles/global.css}">
  <link rel="stylesheet" th:href="@{/styles/header.css}">
  <link rel="stylesheet" th:href="@{/styles/breadcrumb.css}">
  <link rel="stylesheet" th:href="@{/styles/main.css}">
  <link rel="stylesheet" th:href="@{/styles/footer.css}">
  <link rel="stylesheet" th:href="@{/styles/aside.css}">
  <link rel="stylesheet" th:href="@{/styles/attachment-manager.css}">

  <style>
    #main {
      margin-bottom: 100px;
    }

    #aside-dialog {
      left: auto;
      height: 100vh;
      max-height: 100vh;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
      border: none;
    }

  </style>

  <!--/* JS */-->
  <script th:src="@{/scripts/bootstrap.bundle.min.js}"></script>
  <script th:src="@{/scripts/main.js}"></script>
  <script th:src="@{/scripts/aside.js}"></script>
  <script th:src="@{/scripts/pwa.js}"></script>
  <script th:inline="javascript">
    sessionStorage.setItem('contextPath', /*[[@{/}]]*/'');

    /**
     * @typeDef {Object} CsrfToken
     * @property {string} headerName
     * @property {string} parameterName
     * @property {string} token
     */
    const CSRF = /*[[${_csrf}]]*/{};
  </script>

  <script th:if="${message != null}" th:inline="javascript">
    alert(/*[[${message}]]*/'');
  </script>
</head>
<body id="body" class="d-flex flex-column min-vh-100">
<dialog id="aside-dialog" role="alertdialog">
  <th:block th:replace="~{aside :: aside}"></th:block>
</dialog>
<header th:replace="~{header :: header}"></header>
<main id="main" class="grow">
  <th:block layout:fragment="content"></th:block>
</main>
<footer th:replace="~{footer :: footer}"></footer>
</body>
</html>
