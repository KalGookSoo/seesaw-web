<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Header</title>
    <link rel="stylesheet" href="/static/styles/header.css" th:href="@{/styles/header.css}">
    <script src="/static/scripts/header.js" th:src="@{/scripts/header.js}"></script>
</head>

<header id="header" class="d-flex align-items-center justify-content-center" th:fragment="header">
    <div class="container-sm wrapper d-flex align-items-center justify-content-between">
        <div class="logo"><a class="none" th:href="@{/}">대전포스트잇 ♣대전독서모임</a></div>
        <nav class="gnb nav d-none d-lg-flex align-items-center justify-content-start">
            <div class="px-2 nav-item"><a class="btn nav-link" th:classappend="${CURRENT_CATEGORY == null} ? 'main-color' : ''" th:href="@{/}">홈</a></div>
            <div class="px-2 nav-item" th:each="category : ${NESTED_CATEGORIES}">
                <!--/*@thymesVar id="category" type="at.modoo.model.Category"*/-->
                <a class="btn nav-link"
                   th:if="${!#lists.isEmpty(category.children)}"
                   th:href="@{/articles(categoryType=${category.children.get(0).type}, categoryId=${category.children.get(0).id})}"
                   th:classappend="${CURRENT_CATEGORY != null && #strings.equals(category.id, CURRENT_CATEGORY.parent.id)} ? 'main-color' : ''"
                >
                    [[${category.name}]]
                    <span class="badge notification-badge mx-1" th:if="${!category.recentArticles.isEmpty()}" th:text="${category.recentArticles.size()}"></span>
                </a>
            </div>
        </nav>
        <div class="utility d-none d-lg-flex align-items-center">
            <button type="button" class="btn site-map open-aside"><!--/*<span class="icon"></span>*/-->전체보기</button>
            <a class="btn sign-in" sec:authorize="isAnonymous()" th:href="@{/oauth2/authorization/naver}"
               th:text="#{label.sign.in}"></a>
            <form sec:authorize="isAuthenticated()" th:action="@{/sign-out}" th:method="post">
                <button type="submit" class="btn sign-out" th:text="#{label.sign.out}"></button>
            </form>
        </div>
        <div class="d-lg-none d-flex align-items-center">
            <button type="button" class="btn site-map open-aside navbar-toggler" th:title="'전체보기'"><i class="bi bi-list"></i></button>
            <a class="btn" sec:authorize="isAnonymous()" th:href="@{/oauth2/authorization/naver}" th:title="|#{label.sign.in}|">
                <i class="bi bi-box-arrow-in-right"></i>
            </a>
            <form sec:authorize="isAuthenticated()" th:action="@{/sign-out}" th:method="post" class="d-inline">
                <button type="submit" class="btn" th:title="|#{label.sign.out}|">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
</header>

</html>
