<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Header</title>
    <link rel="stylesheet" href="/static/styles/header.css" th:href="@{/styles/header.css}">
    <script src="/static/scripts/header.js" th:src="@{/scripts/header.js}"></script>
</head>

<header id="header" class="d-flex align-items-center justify-content-center" th:fragment="header">
    <div class="container-sm wrapper d-flex align-items-center justify-content-between">
        <div class="logo">대전포스트잇 ♣대전독서모임</div>
        <nav class="gnb d-flex align-items-center justify-content-start">
            <!--/* root categories */-->
            <div class="px-2"><a class="btn" th:href="@{/}">홈</a></div>
            <div class="px-2"><a class="btn" th:href="@{/demo/1}">모임소개</a></div>
            <div class="px-2"><a class="btn" th:href="@{/demo/2}">모임 활동<span class="badge notification-badge mx-1">3</span></a></div>
            <div class="px-2"><a class="btn" th:href="@{/demo/3}">알림장<span class="badge notification-badge mx-1">2</span></a></div>
        </nav>
        <div class="utility d-flex align-items-center">
            <button type="button" class="btn site-map open-aside"><!--/*<span class="icon"></span>*/-->전체보기</button>
            <a class="btn sign-in" sec:authorize="isAnonymous()" th:href="@{/oauth2/authorization/naver}"
               th:text="#{label.sign.in}"></a>
            <form sec:authorize="isAuthenticated()" th:action="@{/sign-out}" th:method="post">
                <button type="submit" class="btn sign-out" th:text="#{label.sign.out}"></button>
            </form>
        </div>
    </div>
</header>

</html>
