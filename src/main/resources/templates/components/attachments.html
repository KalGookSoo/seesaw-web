<!DOCTYPE html>
<html lang="ko" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="attachment_list(attachments)" class="list-group list-group-flush border rounded" th:if="${attachments != null and !#lists.isEmpty(attachments)}">
  <!--/*@thymesVar id="attachment" type="kr.me.seesaw.model.AttachmentModel"*/-->
  <div th:each="attachment : ${attachments}" class="list-group-item d-flex justify-content-between align-items-center py-3">
    <div class="d-flex align-items-center overflow-hidden">
      <i class="bi fs-5 me-3 text-primary" th:classappend="${attachment.iconClass}"></i>
      <div class="text-truncate">
        <div class="text-dark fw-medium text-truncate" th:text="${attachment.originalName}">파일명.ext</div>
        <small class="text-muted" th:text="${attachment.formattedSize}">0 KB</small>
      </div>
    </div>
    <div class="d-flex gap-2">

      <a th:if="${attachment.isPreviewable()}"
         th:href="@{|/api/attachments/${attachment.id}|}" target="_blank"
         class="btn btn-sm btn-outline-success d-flex align-items-center">
        <i class="bi bi-eye"></i>
        <span class="d-none d-sm-inline ms-1" th:text="#{label.preview}">미리보기</span>
      </a>
      <a th:href="@{|/attachments/${attachment.id}/download|}" target="_blank"
         class="btn btn-sm btn-outline-primary d-flex align-items-center">
        <i class="bi bi-download"></i>
        <span class="d-none d-sm-inline ms-1" th:text="#{label.download}">다운로드</span>
      </a>
    </div>
  </div>
</div>
</body>
</html>
