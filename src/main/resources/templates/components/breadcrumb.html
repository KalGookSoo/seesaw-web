<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>



<section class="container-sm pt-4 mt-4" th:fragment="breadcrumbs">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb modern-breadcrumb">
      <!--/* Home with icon */-->
      <li class="breadcrumb-item">
        <div class="dropdown">
          <a class="dropdown-toggle" th:href="@{/}" role="button" id="homeDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-house-door-fill"></i>
          </a>
        </div>
      </li>

      <!--/* Parent category */-->
      <li class="breadcrumb-item" th:if="${selectedCategory.parent != null}">
        <div class="dropdown">
          <a class="dropdown-toggle" href="#" role="button" id="parentDropdown" data-bs-toggle="dropdown" aria-expanded="false"
             th:text="${selectedCategory.parent.name}">
            부모 카테고리
          </a>
          <ul class="dropdown-menu shadow-sm" aria-labelledby="parentDropdown">
            <li th:each="siblingCategory : ${@siteContext.allCategories.values()}"
                th:if="${siblingCategory.parentId == null || #strings.equals(siblingCategory.parentId, selectedCategory.parent.parentId)}">
              <a class="dropdown-item"
                 th:classappend="${#strings.equals(siblingCategory.id, selectedCategory.parent.id)} ? 'active' : ''"
                 th:href="${siblingCategory.url}"
                 th:text="${siblingCategory.name}">
              </a>
            </li>
          </ul>
        </div>
      </li>

      <!--/* Current category */-->
      <li class="breadcrumb-item active" aria-current="page">
        <div class="dropdown">
          <a class="dropdown-toggle" href="#" role="button" id="currentDropdown" data-bs-toggle="dropdown" aria-expanded="false"
             th:text="${selectedCategory.name}">
            현재 카테고리
          </a>
          <ul class="dropdown-menu shadow-sm" aria-labelledby="currentDropdown">
            <!--/* When parent exists, show parent's children (siblings) */-->
            <th:block th:if="${selectedCategory.parent != null}">
              <li th:each="siblingCategory : ${selectedCategory.parent.children}">
                <a class="dropdown-item"
                   th:classappend="${#strings.equals(siblingCategory.id, selectedCategory.id)} ? 'active' : ''"
                   th:href="${siblingCategory.url}"
                   th:text="${siblingCategory.name}">
                </a>
              </li>
            </th:block>
            <!--/* When parent is null (root category), show all nested categories (siblings) */-->
            <th:block th:if="${selectedCategory.parent == null}">
              <li th:each="siblingCategory : ${@siteContext.nestedCategories}">
                <a class="dropdown-item"
                   th:classappend="${#strings.equals(siblingCategory.id, selectedCategory.id)} ? 'active' : ''"
                   th:href="${siblingCategory.url}"
                   th:text="${siblingCategory.name}">
                </a>
              </li>
            </th:block>
          </ul>
        </div>
      </li>
    </ol>
  </nav>
</section>
</body>
</html>
