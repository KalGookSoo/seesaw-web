<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="search" class="container-sm board-table-search-section my-4">
    <form>
        <div class="d-flex justify-content-center align-items-center gap-2">
            <div>
                <label>
                    <select class="from-control form-select">
                        <option value="title" th:text="#{entity.article.title}"></option>
                        <option value="content" th:text="#{entity.article.content}"></option>
                    </select>
                </label>
            </div>
            <div>
                <label>
                    <input class="form-control" type="search">
                </label>
            </div>
            <div>
                <button class="btn btn-outline-secondary" type="button">검색</button>
            </div>
        </div>
    </form>
</section>
</body>
</html>
