<!DOCTYPE html>
<!--suppress HtmlFormInputWithoutLabel */-->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      th:lang="${#locale.language}"
>

<head>

    <meta name="description" th:content="${@siteContext.site.intro}">
    <meta name="keywords" th:content="${@siteContext.site.name}">

    <meta property="og:type" content="website">
    <meta property="og:title" content="페이지 제목" th:content="${@siteContext.site.name}">
    <meta property="og:description" content="페이지 설명" th:content="${@siteContext.site.intro}">
    <meta property="og:image" content="페이지 썸네일 이미지 주소" th:if="${@siteContext.site.profileImage != null}"
          th:content="${REQUEST_URI_BUILDER.cloneBuilder().replacePath('/api/attachments/' + @siteContext.site.profileImage.id).replaceQuery(null).toUriString()}">
    <meta property="og:url" content="페이지 주소" th:content="${REQUEST_URI_BUILDER.cloneBuilder().toUriString()}">

    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="페이지 제목" th:content="${@siteContext.site.name}">
    <meta property="twitter:description" content="페이지 설명" th:content="${@siteContext.site.description}">
    <meta property="twitter:image" content="페이지 썸네일 이미지 주소" th:if="${@siteContext.site.profileImage != null}"
          th:content="${REQUEST_URI_BUILDER.cloneBuilder().replacePath('/api/attachments/' + @siteContext.site.profileImage.id).replaceQuery(null).toUriString()}">

    <title>[[#{label.home}]] | [[${@siteContext.site.name}]]</title>
    <link rel="stylesheet" href="/static/styles/index.css" th:href="@{/styles/index.css}">
    <!-- TUI Calendar CSS -->
    <link rel="stylesheet" href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css">

    <style>
        #header.scrolled {
            background-color: rgb(255, 255, 255);
        }
        #header:not(.scrolled) {
            background-color: transparent;
        }
        .calendar-container {
            height: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', e => {
            const header = e.target.getElementById('header');
            e.target.addEventListener('scroll', e => {
                const methodName = window.scrollY > 0 ? 'add' : 'remove';
                header.classList[methodName]('scrolled');
            });
        });
    </script>
</head>

<div layout:fragment="content">
<section class="profile-section d-flex flex-column justify-content-center align-items-center" th:style="${@siteContext.site.backgroundImage != null ? 'background-image: url(/api/attachments/' + @siteContext.site.backgroundImage.id + ')' : ''}">
    <div class="profile d-flex flex-column justify-content-center align-items-center container-fluid px-3">
        <p class="image mb-3" th:if="${@siteContext.site.profileImage != null}"><img class="rounded-circle shadow" th:alt="#{label.profile.image}" th:title="#{label.profile.image}" th:src="@{|/api/attachments/${@siteContext.site.profileImage.id}|}"></p>
        <h2 class="mb-3" th:text="${@siteContext.site.name}"></h2>
        <p class="text-center px-2" th:text="${@siteContext.site.description}"></p>
    </div>
</section>
<section class="intro-section d-flex flex-column justify-content-center align-items-center container-fluid">
    <h6 class="mb-3" th:text="${@siteContext.site.intro}"></h6>
    <span class="text-center px-3 mb-3" th:text="${@siteContext.site.content}"></span>
</section>
<section class="board-section container-fluid container-lg px-3" th:each="page : ${siteExposedBoardPages}">
    <header class="d-flex justify-content-between align-items-center">
        <h5 class="h5 main-color" th:text="${ALL_CATEGORIES.get(page.getKey()).name}"></h5>
        <p><a class="none d-flex align-items-center" th:href="@{/articles(categoryId=${page.getKey()}, categoryType=${ALL_CATEGORIES.get(page.getKey()).type})}" th:title="#{label.more}"><span th:text="#{label.more}">더보기</span> <i class="bi bi-arrow-right ms-1"></i></a></p>
    </header>
    <div class="container-fluid px-0">
        <div class="row row-cols-1 row-cols-lg-3 g-4">
            <article class="col" th:each="article : ${page.getValue().content}">
                <a class="btn w-100 h-100 text-start shadow-sm rounded p-3"
                   th:href="${article.url}"
                   th:title="${article.title}"
                >
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="title" th:text="${article.title}"></h5>
                        <div class="d-flex align-items-center" th:if="${not #lists.isEmpty(article.replies)}">
                            <i class="bi bi-chat-dots mx-1"></i>
                            <span class="main-color" th:text="${article.replies.size()}"></span>
                        </div>
                    </div>
                    <div class="content d-flex flex-column flex-md-row align-items-start justify-content-between mb-2 gap-3">
                        <div class="small text-muted grow" th:text="${article.plainContent}"></div>
                        <div class="thumbnail mt-2 mt-md-0" th:if="${not #lists.isEmpty(article.inlineImages)}">
                            <img class="img-fluid rounded" th:src="@{|/api/attachments/${article.inlineImages.get(0).id}|}" th:alt="${article.inlineImages.get(0).originalName}">
                        </div>
                    </div>
                    <div class="author d-flex justify-content-start align-items-center small text-muted">
                        <div th:text="${article.maskedAuthor}"></div>
                        <div class="mx-2">|</div>
                        <div th:text="${#temporals.format(article.createdDate, 'yyyy.MM.dd')}"></div>
                    </div>
                </a>
            </article>
        </div>
    </div>
</section>
<section class="schedule-section container-fluid container-lg px-3 mb-5" th:each="schedule : ${siteExposedScheduleEvents}">
    <header class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="h5 main-color mb-0" th:text="${ALL_CATEGORIES.get(schedule.getKey()).name}"></h5>
        <p class="mb-0"><a class="none d-flex align-items-center" th:href="@{/articles(categoryId=${schedule.getKey()}, categoryType='SCHEDULE')}" th:title="#{label.more}"><span th:text="#{label.more}">더보기</span> <i class="bi bi-arrow-right ms-1"></i></a></p>
    </header>
    <div class="calendar-container" th:id="|calendar-${schedule.getKey()}|"></div>
</section>

<!-- TUI Calendar JS -->
<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>
<script type="module" th:inline="javascript">
  const formatDate = (dateString) => {
    if (!dateString) return '';
    const date = new Date(dateString);
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const dayName = days[date.getDay()];
    const yyyy = date.getFullYear();
    const MM = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    const HH = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    return `${yyyy}-${MM}-${dd} ${HH}:${mm}`;
  };

  document.addEventListener('DOMContentLoaded', () => {
    const events = /*[[${siteExposedScheduleEvents}]]*/ {};
    const allCategories = /*[[${ALL_CATEGORIES}]]*/ {};

    Object.entries(events).forEach(([categoryId, events]) => {
      const calendarEl = document.getElementById(`calendar-${categoryId}`);
      const category = allCategories[categoryId];
      if (calendarEl) {
        const calendar = new tui.Calendar(calendarEl, {
          defaultView: 'month',
          isReadOnly: true,
          useDetailPopup: true,
          usageStatistics: false,
          timezone: {
            zones: [
              {
                timezoneName: 'Asia/Seoul',
                displayLabel: 'Seoul',
              },
            ],
          },
          calendars: [
            {
              id: categoryId,
              name: category.name,
              backgroundColor: '#03bd9e',
              borderColor: '#03bd9e',
              dragBackgroundColor: '#03bd9e',
            },
          ],
          template: {
            time(event) {
              return event.title;
            },
            allday(event) {
              return event.title;
            },
            popupIsAllday: function () {
              return '종일';
            },
            popupStateFree: function () {
              return '여유';
            },
            popupStateBusy: function () {
              return '긴급';
            },
            titlePlaceholder: function () {
              return '제목';
            },
            locationPlaceholder: function () {
              return '장소';
            },
            startDatePlaceholder: function () {
              return `시작일시`;
            },
            endDatePlaceholder: function () {
              return '종료일시';
            },
            popupDetailTitle: function (data) {
              return data.title;
            },
            popupDetailDate: function (data) {
              const start = new Date(data.start);
              const end = new Date(data.end);
              return data.isAllday ? `${formatDate(start)} (종일)` : `${formatDate(start)} ~ ${formatDate(data.end)}`;
            },
            popupDetailLocation: function (data) {
              return data.location;
            },
            popupDetailUser: function (data, calendar) {
              // Attendee 출력 방지
              return '';
            },
            popupDetailState: function (data) {
              return data.state;
            },
            popupDetailBody: function (data) {
              return data.body;
            },
            popupDetailEdit: function () {
              return '';
            },
            popupDetailDelete: function () {
              return '';
            }
          }
        });

        const eventStatus = /*[[${eventStatus}]]*/{};

        const calendarEvents = events.map(item => {
          const start = new Date(item.dtStart);
          const hasEnd = !!item.dtEnd;
          // 종료 시간이 없으면 당일 23:59:59로 설정하거나 시작 시간+30분
          let end = hasEnd ? new Date(item.dtEnd) : new Date(new Date(start).setHours(23, 59, 59));

          if (end <= start) {
            end = new Date(start.getTime() + 30 * 60 * 1000);
          }

          return {
            id: item.articleId,
            calendarId: categoryId,
            title: item.title,
            body: item.description || '',
            start: start,
            end: end,
            location: item.location || '',
            // dtEnd가 없으면 종일 일정으로 간주
            category: hasEnd ? 'time' : 'allday',
            isAllday: !hasEnd,
            state: eventStatus[item.status],
            // 서버에서 온 데이터나 권한에 따라 읽기 전용 여부 결정 가능
            isReadOnly: true,
            attendees: [],
            raw: item
          };
        });

        calendar.createEvents(calendarEvents);
      }
    });
  });
</script>
</div>
</html>
