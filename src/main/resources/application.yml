server:
  address: localhost
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: seesaw-web
    version: 0.0.1-SNAPSHOT
  pid:
    file: ${spring.application.name}.pid
  config:
    import: "optional:configserver:"
  banner:
    location: classpath:banner.txt

  # DataSource
  h2:
    console:
      enabled: true
      path: /h2-console
  
  datasource:
    url: jdbc:h2:file:./testdb;MODE=PostgreSQL;
    driver-class-name: org.h2.Driver
    username: tester
    password: tester
  
  # JPA
  jpa:
    properties:
      hibernate:
        highlight_sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: 직접입력
    password: 직접입력
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000

  # Lazy initialization
  main:
    lazy-initialization: true
  
  # 정적 자원 경로
  web:
    resources:
      static-locations: classpath:/static/, classpath:/node_modules/
      cache:
        period: 5
  
  # HTML 비표준 HTTP method(ex - PUT, DELETE ..)를 활성화 합니다.
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  
  # Thymeleaf template engine cache를 비활성화합니다. 템플릿 파일 변경 사항이 즉시 반영됩니다.
  thymeleaf:
    cache: false
  
  # 메시지 파일(i18n 지원 파일)의 캐시 만료 시간을 초 단위로 설정합니다. 메시지 변경 사항이 즉시 반영됩니다.
  messages:
    cache-duration: 5
  
  data:
    rest:
      base-path: /rest-api
  
  # 첨부파일
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 50MB
      max-request-size: 50MB
  
  # Logging
  output:
    ansi:
      enabled: always

  # OAuth
  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: YOUR_NAVER_CLIENT_ID
            client-secret: YOUR_NAVER_CLIENT_SECRET
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope: profile,email
            client-name: Naver
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: '*'
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: ${spring.application.version}
    profiles: ${spring.profiles.active:default}

jwt:
  secret:
    key: YOUR_JWT_SECRET_KEY_MUST_BE_AT_LEAST_32_BYTES

# Logging
logging:
  level:
    root: info
    org:
      springframework:
        web: debug
        security: info
        orm:
          jpa: info
      hibernate:
        sql: info
        orm:
          jdbc:
            bind: trace
            extract: off
      springdoc:
        core:
          utils:
            SpringDocAnnotationsUtils: error

