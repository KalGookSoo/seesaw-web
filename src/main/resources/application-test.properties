# DataSource
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;
# jdbc:h2:tcp://localhost:9092/mem:testdb;MODE=PostgreSQL; \uB85C DB Connection\uD560 \uC218 \uC788\uC74C
#spring.datasource.url=jdbc:h2:file:./testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=tester
spring.datasource.password=tester

# Attachment
kr.me.seesaw.filepath=${user.home}/seesaw/files

# OAuth
spring.security.oauth2.client.registration.naver.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.naver.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.naver.redirect-uri=YOUR_REDIRECT_URI
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=profile,email
spring.security.oauth2.client.registration.naver.client-name=Naver

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response
